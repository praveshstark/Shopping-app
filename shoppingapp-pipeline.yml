AWSTemplateFormatVersion: '2010-09-09'
Description: Full CodePipeline for shoppingapp with ECS deploy (automatic GitHub triggers)

Parameters:
  GitHubRepo:
    Type: String
    Description: GitHub repository (username/repo)
  GitHubBranch:
    Type: String
    Default: main
  GitHubOAuthToken:
    Type: String
    NoEcho: true
  ECRRepository:
    Type: String
    Default: shoppingapp
  ECSClusterName:
    Type: String
  ECSTaskDefinition:
    Type: String
  ECSServiceName:
    Type: String

Resources:

  # -------------------------
  # S3 Bucket for artifacts
  # -------------------------
  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-artifacts-${AWS::Region}"

  # -------------------------
  # CodeBuild Role
  # -------------------------
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: shoppingapp-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  # -------------------------
  # CodeBuild Project
  # -------------------------
  ShoppingAppBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: shoppingapp-build
      SSource:
        Type: GITHUB
        Location: https://github.com/praveshstark/Shopping-app.git
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        PrivilegedMode: true
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Description: Build project for shoppingapp
      SourceVersion: !Ref GitHubBranch
      BuildSpec: |
        version: 0.2
        phases:
          pre_build:
            commands:
              - echo Logging in to Amazon ECR...
              - IMAGE_TAG=latest
              - REPO_URI=!Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}'
              - aws ecr get-login-password --region ${AWS::Region} | docker login --username AWS --password-stdin $REPO_URI
          build:
            commands:
              - echo Build started on `date`
              - mvn clean package
              - docker build -t shoppingapp:$IMAGE_TAG .
              - docker tag shoppingapp:$IMAGE_TAG $REPO_URI:$IMAGE_TAG
          post_build:
            commands:
              - echo Pushing Docker image...
              - docker push $REPO_URI:$IMAGE_TAG
              - echo Writing imagedefinitions.json file...
              - printf '[{"name":"shoppingapp","imageUri":"%s"}]' $REPO_URI:$IMAGE_TAG > imagedefinitions.json
        artifacts:
          files:
            - imagedefinitions.json

  # -------------------------
  # CodePipeline Role
  # -------------------------
  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: shoppingapp-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  # -------------------------
  # CodePipeline
  # -------------------------
  ShoppingAppPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: shoppingapp-pipeline
      RoleArn: !GetAtt CodePipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Provider: GitHub
                Version: '1'
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                Owner: !Select [0, !Split ["/", !Ref GitHubRepo]]
                Repo: !Select [1, !Split ["/", !Ref GitHubRepo]]
                Branch: !Ref GitHubBranch
                OAuthToken: !Ref GitHubOAuthToken
              RunOrder: 1
        - Name: Build
          Actions:
            - Name: BuildAction
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              Configuration:
                ProjectName: !Ref ShoppingAppBuildProject
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: ECSDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: ECS
                Version: '1'
              InputArtifacts:
                - Name: BuildOutput
              Configuration:
                ClusterName: !Ref ECSClusterName
                ServiceName: !Ref ECSServiceName
                FileName: imagedefinitions.json
              RunOrder: 1

  # -------------------------
  # GitHub Webhook for automatic triggers
  # -------------------------
  GitHubWebhook:
    Type: AWS::CodePipeline::Webhook
    Properties:
      Name: shoppingapp-github-webhook
      TargetPipeline: !Ref ShoppingAppPipeline
      TargetAction: GitHubSource
      Filters:
        - JsonPath: $.ref
          MatchEquals: !Sub 'refs/heads/${GitHubBranch}'
      Authentication: GITHUB_HMAC
      AuthenticationConfiguration:
        SecretToken: my-webhook-secret
      RegisterWithThirdParty: true